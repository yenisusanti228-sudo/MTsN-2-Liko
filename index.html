<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f2f5f9;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:800px;
    background:white;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.header{
    background:linear-gradient(135deg,#006400,#0f9d58);
    color:white;
    text-align:center;
    padding:50px 20px;
}

.header h1{
    font-size:42px;
    font-weight:700;
}

.header h2{
    margin-top:10px;
    font-size:24px;
    font-weight:400;
}

.header p{
    margin-top:10px;
}

.content{
    padding:40px 30px;
}

.info{
    background:#f8f9fa;
    border-left:5px solid #0f9d58;
    padding:20px;
    border-radius:12px;
    margin-bottom:30px;
    line-height:1.8;
}

input{
    width:100%;
    padding:16px;
    border:2px solid #ddd;
    border-radius:12px;
    font-size:16px;
    margin-bottom:20px;
    outline:none;
}

input:focus{
    border-color:#0f9d58;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    background:#0f9d58;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#087443;
}

.hasil{
    display:none;
    margin-top:30px;
    padding:30px;
    border-radius:20px;
    text-align:center;
}

.lulus{
    background:#e8f5e9;
    border:3px solid #2e7d32;
    color:#1b5e20;
}

.gagal{
    background:#ffebee;
    border:3px solid #c62828;
    color:#b71c1c;
}

.hasil h1{
    font-size:42px;
    margin:15px 0;
}

.data{
    margin-top:20px;
    text-align:left;
    line-height:2;
    font-size:18px;
}

.footer{
    background:#f1f1f1;
    text-align:center;
    padding:20px;
    color:#666;
}

@media(max-width:600px){

    .header h1{
        font-size:30px;
    }

    .hasil h1{
        font-size:28px;
    }

}

</style>
</head>
